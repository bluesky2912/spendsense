<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendSense — Smart Expense Tracker</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f15;
      --bg2: #1c1c28;
      --bg3: #27273a;
      --text: #f0f0ff;
      --text2: #8b8ba0;
      --red: #f43f5e;
      --orange: #f97316;
      --accent: #7c6aff;
      --border: #ffffff08;
      --green: #22d3a5;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      line-height: 1.6;
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ============ HEADER ============ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 32px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo h1 span {
      color: var(--accent);
    }

    .savage-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .savage-toggle:hover {
      border-color: var(--accent);
    }

    .toggle-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text2);
      transition: all 0.3s;
    }

    .savage-toggle.active .toggle-dot {
      background: var(--red);
    }

    .savage-toggle span {
      font-size: 12px;
      color: var(--text2);
      transition: all 0.3s;
    }

    .savage-toggle.active span {
      color: var(--red);
    }

    /* ============ DASHBOARD GRID ============ */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .stat-icon {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat-delta {
      font-size: 12px;
      color: var(--text2);
    }

    .stat-delta.up {
      color: var(--green);
    }

    .stat-delta.down {
      color: var(--red);
    }

    /* ============ BUDGET BAR ============ */
    .budget-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .budget-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .budget-title {
      font-weight: 600;
    }

    .budget-pct {
      color: var(--text2);
    }

    .budget-track {
      width: 100%;
      height: 8px;
      background: var(--bg3);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .budget-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: all 0.3s;
    }

    .budget-fill.warning {
      background: #fbbf24;
    }

    .budget-fill.danger {
      background: var(--red);
    }

    .budget-fill.over {
      background: var(--red);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .budget-warning {
      font-size: 12px;
      color: var(--text2);
      min-height: 20px;
    }

    .budget-warning.show {
      color: var(--orange);
    }

    .budget-warning.show.danger {
      color: var(--red);
    }

    /* ============ INSIGHTS ============ */
    .insights-strip {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .insight-chip {
      background: var(--bg2);
      border: 1px solid var(--accent);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ============ CONTENT GRID ============ */
    .content-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    .charts-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chart-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* ============ PANELS ============ */
    .add-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.1);
    }

    .amount-row {
      display: flex;
      align-items: center;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding-left: 12px;
    }

    .currency-symbol {
      color: var(--accent);
      font-weight: 600;
      margin-right: 8px;
    }

    .amount-row input {
      border: none;
      background: transparent;
      padding: 10px 12px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #6d52dd;
      transform: translateY(-2px);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .budget-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* ============ EXPENSE LIST ============ */
    .expense-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .expense-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .expense-title {
      font-size: 14px;
      font-weight: 600;
    }

    .expense-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-input, .filter-select {
      height: 36px;
      padding: 8px 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
    }

    .search-input::placeholder {
      color: var(--text2);
    }

    .expense-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .expense-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg3);
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .expense-item:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }

    .cat-dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .expense-info {
      flex: 1;
    }

    .expense-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .expense-meta {
      font-size: 11px;
      color: var(--text2);
    }

    .expense-amount {
      font-weight: 700;
      font-size: 14px;
      min-width: 70px;
      text-align: right;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      transition: all 0.3s;
    }

    .delete-btn:hover {
      color: var(--red);
    }

    /* ============ BOTTOM BAR ============ */
    .bottom-bar {
      padding: 20px 0;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    /* ============ TOAST ============ */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      animation: toastSlide 0.3s ease-out;
    }

    @keyframes toastSlide {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo">
      <div class="logo-icon">💸</div>
      <h1>Spend<span>Sense</span></h1>
    </div>
    <div class="header-controls">
      <div class="savage-toggle" id="savageToggle" onclick="toggleSavage()">
        <div class="toggle-dot"></div>
        <span id="savageLabel">Savage Mode</span>
      </div>
    </div>
  </header>

  <!-- ===== DASHBOARD STATS ===== -->
  <div class="dashboard-grid">
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="weeklyTotal">₹0</div>
      <div class="stat-delta" id="weeklyDelta">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🗓</div>
      <div class="stat-label">This Month</div>
      <div class="stat-value" id="monthlyTotal">₹0</div>
      <div class="stat-delta" id="monthlyDelta">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-label">Top Category</div>
      <div class="stat-value" id="topCat" style="font-size:16px;line-height:1.4">—</div>
      <div class="stat-delta" id="topCatAmount">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🧾</div>
      <div class="stat-label">Total Entries</div>
      <div class="stat-value" id="totalCount">0</div>
      <div class="stat-delta" id="todaySpend">Today: ₹0</div>
    </div>
  </div>

  <!-- ===== BUDGET BAR ===== -->
  <div class="budget-card">
    <div class="budget-header">
      <span class="budget-title">Monthly Budget</span>
      <span class="budget-pct" id="budgetPct">—</span>
    </div>
    <div class="budget-track">
      <div class="budget-fill" id="budgetFill" style="width:0%"></div>
    </div>
    <div class="budget-warning" id="budgetWarning"></div>
  </div>

  <!-- ===== INSIGHTS STRIP ===== -->
  <div class="insights-strip" id="insightsStrip">
    <div class="insight-chip">💡 Add expenses to see insights</div>
  </div>

  <!-- ===== MAIN CONTENT GRID ===== -->
  <div class="content-grid">

    <!-- Charts Column -->
    <div class="charts-section">
      <div class="chart-card">
        <div class="chart-title">📊 Daily Spending — Last 7 Days</div>
        <canvas id="barChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">🥧 Category Split</div>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <!-- Add Expense + Budget Settings Column -->
    <div style="display:flex;flex-direction:column;gap:16px;">

      <div class="add-panel">
        <div class="panel-title">➕ Add Expense</div>

        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="expName" placeholder="e.g. Chicken biryani" />
        </div>

        <div class="form-group">
          <label class="form-label">Amount (₹)</label>
          <div class="amount-row">
            <div class="currency-symbol">₹</div>
            <input type="number" id="expAmount" placeholder="0.00" min="0" step="0.01" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Category</label>
          <select id="expCategory">
            <option value="Food">🍔 Food & Dining</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Shopping">🛍 Shopping</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Health">💊 Health</option>
            <option value="Bills">💡 Bills & Utilities</option>
            <option value="Education">📚 Education</option>
            <option value="Travel">✈️ Travel</option>
            <option value="Random">🎲 Random</option>
            <option value="Other">📌 Other</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="expDate" />
        </div>

        <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
      </div>

      <div class="add-panel">
        <div class="panel-title">⚙️ Budget Settings</div>
        <div class="budget-inputs">
          <div class="form-group">
            <label class="form-label">Monthly (₹)</label>
            <input type="number" id="monthlyBudget" placeholder="20000" />
          </div>
          <div class="form-group">
            <label class="form-label">Weekly (₹)</label>
            <input type="number" id="weeklyBudget" placeholder="5000" />
          </div>
        </div>
        <button class="btn btn-ghost" onclick="saveBudget()">Save Budget</button>
      </div>

    </div>
  </div>

  <!-- ===== EXPENSE LIST ===== -->
  <div class="expense-section">
    <div class="expense-header">
      <span class="expense-title">📋 All Expenses</span>
      <div class="expense-controls">
        <input type="text" class="search-input" id="searchInput" placeholder="Search..." oninput="renderList()" />
        <select class="filter-select" id="filterCat" onchange="renderList()">
          <option value="">All Categories</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Bills">💡 Bills</option>
          <option value="Education">📚 Education</option>
          <option value="Travel">✈️ Travel</option>
          <option value="Random">🎲 Random</option>
          <option value="Other">📌 Other</option>
        </select>
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
    <div class="expense-list" id="expenseList">
      <div class="empty-state">
        <div class="empty-icon">🪙</div>
        <p>No expenses yet. Add one above.</p>
      </div>
    </div>
  </div>

  <!-- ===== BOTTOM BAR ===== -->
  <div class="bottom-bar">
    <button class="btn btn-ghost" style="font-size:12px;color:var(--red);" onclick="clearAll()">🗑 Clear All Data</button>
  </div>

</div>

<!-- ===== TOAST CONTAINER ===== -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ==================== GLOBAL STATE ==================== */
let expenses = [];
let budget = { monthly: 20000, weekly: 5000 };
let savageMode = false;

/* ==================== STORAGE ==================== */
const Storage = {
  getExpenses() {
    return JSON.parse(localStorage.getItem('ss_expenses') || '[]');
  },
  saveExpenses(expenses) {
    localStorage.setItem('ss_expenses', JSON.stringify(expenses));
  },
  getBudget() {
    return JSON.parse(localStorage.getItem('ss_budget') || '{"monthly":20000,"weekly":5000}');
  },
  saveBudget(budget) {
    localStorage.setItem('ss_budget', JSON.stringify(budget));
  },
  getSavageMode() {
    return localStorage.getItem('ss_savage') === 'true';
  },
  setSavageMode(mode) {
    localStorage.setItem('ss_savage', mode ? 'true' : 'false');
  },
  clearAll() {
    localStorage.removeItem('ss_expenses');
    localStorage.removeItem('ss_budget');
    localStorage.removeItem('ss_savage');
  }
};

/* ==================== CALCULATIONS ==================== */
function fmt(n) {
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function getMonthlyTotal(expenses) {
  const now = new Date();
  const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
  return expenses
    .filter(e => new Date(e.date) >= firstDay)
    .reduce((sum, e) => sum + e.amount, 0);
}

function getWeeklyTotal(expenses) {
  const now = new Date();
  const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  return expenses
    .filter(e => new Date(e.date) >= sevenDaysAgo)
    .reduce((sum, e) => sum + e.amount, 0);
}

function getTodayTotal(expenses) {
  const today = new Date().toISOString().split('T')[0];
  return expenses
    .filter(e => e.date === today)
    .reduce((sum, e) => sum + e.amount, 0);
}

function getTopCategory(expenses) {
  const cats = {};
  expenses.forEach(e => {
    cats[e.category] = (cats[e.category] || 0) + e.amount;
  });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  return sorted[0] || null;
}

function getCategoryBreakdown(expenses) {
  const cats = {};
  expenses.forEach(e => {
    cats[e.category] = (cats[e.category] || 0) + e.amount;
  });
  return cats;
}

function getDailyLast7(expenses) {
  const daily = {};
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split('T')[0];
    daily[dateStr] = 0;
  }
  expenses.forEach(e => {
    if (daily.hasOwnProperty(e.date)) {
      daily[e.date] += e.amount;
    }
  });
  return Object.entries(daily).map(([date, total]) => {
    const d = new Date(date);
    const label = d.toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
    return { label, total };
  });
}

function getWeekendVsWeekday(expenses) {
  let wendTotal = 0, wendCount = 0, wdayTotal = 0, wdayCount = 0;
  expenses.forEach(e => {
    const d = new Date(e.date);
    const dow = d.getDay();
    if (dow === 0 || dow === 6) {
      wendTotal += e.amount;
      wendCount++;
    } else {
      wdayTotal += e.amount;
      wdayCount++;
    }
  });
  return {
    wendAvg: wendCount > 0 ? wendTotal / wendCount : 0,
    wdayAvg: wdayCount > 0 ? wdayTotal / wdayCount : 0,
    weekendItems: wendCount,
    weekdayItems: wdayCount
  };
}

function getSpendingStreak(expenses) {
  if (expenses.length === 0) return 0;
  const dates = new Set(expenses.map(e => e.date));
  const sorted = Array.from(dates).sort().reverse();
  let streak = 0;
  let current = new Date();
  current.setHours(0, 0, 0, 0);
  for (let i = 0; i < 100; i++) {
    const dateStr = current.toISOString().split('T')[0];
    if (dates.has(dateStr)) {
      streak++;
    } else if (i === 0) {
      break;
    } else {
      break;
    }
    current.setDate(current.getDate() - 1);
  }
  return streak;
}

function getMaxExpense(expenses) {
  return expenses.reduce((max, e) => e.amount > (max?.amount || 0) ? e : max, null);
}

/* ==================== CATEGORY CONFIG ==================== */
const CAT = {
  Food:          { emoji: '🍔', color: '#f97316', bg: '#f9731620' },

/* ==================== UI UPDATES ==================== */
function updateStats() {
  const weekly  = getWeeklyTotal(expenses);
  const monthly = getMonthlyTotal(expenses);
  const today   = getTodayTotal(expenses);
  const top     = getTopCategory(expenses);

  document.getElementById('weeklyTotal').textContent  = fmt(weekly);
  document.getElementById('monthlyTotal').textContent = fmt(monthly);
  document.getElementById('totalCount').textContent   = expenses.length;
  document.getElementById('todaySpend').textContent   = `Today: ${fmt(today)}`;

  const weekPct = budget.weekly ? Math.round((weekly / budget.weekly) * 100) : 0;
  const weekDeltaEl = document.getElementById('weeklyDelta');
  weekDeltaEl.textContent = budget.weekly ? `${weekPct}% of weekly budget` : '—';
  weekDeltaEl.className = 'stat-delta ' + (weekPct > 90 ? 'down' : weekPct > 60 ? '' : 'up');

  if (top) {
    document.getElementById('topCat').textContent = `${CAT[top[0]]?.emoji || '📌'} ${top[0]}`;
    document.getElementById('topCatAmount').textContent = fmt(top[1]);
  } else {
    document.getElementById('topCat').textContent = '—';
    document.getElementById('topCatAmount').textContent = '—';
  }
}

function updateBudget() {
  const monthly = getMonthlyTotal(expenses);
  const real = budget.monthly ? (monthly / budget.monthly) * 100 : 0;
  const pct = Math.min(real, 100);

  document.getElementById('budgetPct').textContent = budget.monthly
    ? `${fmt(monthly)} / ${fmt(budget.monthly)} (${Math.round(real)}%)`
    : 'No budget set';

  const fill = document.getElementById('budgetFill');
  fill.style.width = pct + '%';
  fill.className = 'budget-fill';
  if (real >= 100) fill.classList.add('over');
  else if (real >= 80) fill.classList.add('danger');
  else if (real >= 60) fill.classList.add('warning');

  const warn = document.getElementById('budgetWarning');
  warn.className = 'budget-warning';

  if (real >= 100) {
    warn.className = 'budget-warning show danger';
    warn.textContent = savageMode
      ? `💀 Budget DEMOLISHED. You spent ${fmt(monthly - budget.monthly)} extra. Gg no re.`
      : `🚨 Budget exceeded! You're ${fmt(monthly - budget.monthly)} over limit.`;
  } else if (real >= 80) {
    warn.className = 'budget-warning show danger';
    warn.textContent = savageMode
      ? `😈 ${Math.round(real)}% budget used. Final form unlocked. Help yourself.`
      : `⚠️ ${Math.round(real)}% of monthly budget used. Slow down!`;
  } else if (real >= 60) {
    warn.className = 'budget-warning show warn';
    warn.textContent = savageMode
      ? `🤔 ${Math.round(real)}% gone. Your future self is shaking.`
      : `🟡 ${Math.round(real)}% of monthly budget used. Stay mindful.`;
  } else {
    warn.textContent = '';
  }
}

function updateInsights() {
  const strip = document.getElementById('insightsStrip');

  if (expenses.length === 0) {
    strip.innerHTML = '<div class="insight-chip">💡 Add expenses to see insights</div>';
    return;
  }

  const insights = [];
  const cats = getCategoryBreakdown(expenses);
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const monthly = getMonthlyTotal(expenses);

  if (sorted[0]) {
    const [cat, amt] = sorted[0];
    insights.push(
      savageMode
        ? `${CAT[cat]?.emoji} You blew ${fmt(amt)} on ${cat}. Classic.`
        : `${CAT[cat]?.emoji} You spend most on ${cat} — ${fmt(amt)} this month`
    );
  }

  const { wendAvg, wdayAvg, weekendItems, weekdayItems } = getWeekendVsWeekday(expenses);
  if (weekendItems > 0 && weekdayItems > 0 && wendAvg > wdayAvg * 1.5) {
    insights.push(
      savageMode
        ? `📈 Spending spikes on weekends. You party like nobody's watching the bank account.`
        : `📈 Spending spikes on weekends — avg ${fmt(Math.round(wendAvg))} vs ${fmt(Math.round(wdayAvg))} weekdays`
    );
  }

  if (cats['Random'] > 0) {
    insights.push(
      savageMode
        ? `🎲 ${fmt(cats['Random'])} on 'Random'? Bestie what IS that 💀`
        : `🎲 ${fmt(cats['Random'])} spent in 'Random' category this month`
    );
  }

  const streak = getSpendingStreak(expenses);
  if (streak >= 3) {
    insights.push(
      savageMode
        ? `🔥 ${streak}-day spending streak. Consistency, but make it ruinous.`
        : `🔥 ${streak}-day spending streak! You're consistently tracking.`
    );
  }

  const maxExp = getMaxExpense(expenses);
  if (maxExp && maxExp.amount > 0) {
    insights.push(
      savageMode
        ? `💸 Biggest splurge: ${fmt(maxExp.amount)} on "${maxExp.name}". Bold move.`
        : `💸 Biggest single expense: ${fmt(maxExp.amount)} on "${maxExp.name}"`
    );
  }

  if (budget.monthly && monthly > 0) {
    const pct = Math.round((monthly / budget.monthly) * 100);
    if (pct < 40) {
      insights.push(
        savageMode
          ? `👍 Only ${pct}% of budget used. Plot twist: you're not broke yet.`
          : `✅ Great! Only ${pct}% of your monthly budget used so far`
      );
    }
  }

  strip.innerHTML = insights
    .map((ins, i) => `<div class="insight-chip" style="animation-delay:${i * 0.05}s">${ins}</div>`)
    .join('');
}

/* ==================== CHARTS ==================== */
let barChart = null;
let pieChart = null;

const CHART_THEME = {
  tooltip: {
    backgroundColor: '#111118',
    borderColor: '#ffffff18',
    borderWidth: 1,
    titleColor: '#8b8ba0',
    bodyColor: '#f0f0ff',
  },
  tickFont: { family: 'JetBrains Mono', size: 11 },
  gridColor: '#ffffff08',
  tickColor: '#5a5a72',
};

function renderBarChart() {
  const daily = getDailyLast7(expenses);
  const barCtx = document.getElementById('barChart').getContext('2d');

  if (barChart) barChart.destroy();

  barChart = new Chart(barCtx, {
    type: 'bar',
    data: {
      labels: daily.map(d => d.label),
      datasets: [{
        data: daily.map(d => d.total),
        backgroundColor: daily.map(d => d.total > 0 ? '#7c6aff40' : '#ffffff08'),
        borderColor: daily.map(d => d.total > 0 ? '#7c6aff' : '#ffffff15'),
        borderWidth: 1,
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          ...CHART_THEME.tooltip,
          callbacks: {
            label: ctx => fmt(ctx.raw),
          },
        },
      },
      scales: {
        x: {
          grid: { color: CHART_THEME.gridColor },
          ticks: { color: CHART_THEME.tickColor, font: CHART_THEME.tickFont },
        },
        y: {
          grid: { color: CHART_THEME.gridColor },
          ticks: {
            color: CHART_THEME.tickColor,
            font: CHART_THEME.tickFont,
            callback: v => v === 0 ? '₹0' : '₹' + (v >= 1000 ? Math.round(v / 1000) + 'k' : v),
          },
        },
      },
    },
  });
}

function renderPieChart() {
  const cats = getCategoryBreakdown(expenses);
  const pieCtx = document.getElementById('pieChart').getContext('2d');

  if (pieChart) pieChart.destroy();

  const catEntries = Object.entries(cats);

  if (catEntries.length === 0) {
    pieChart = new Chart(pieCtx, {
      type: 'doughnut',
      data: {
        labels: ['No data'],
        datasets: [{
          data: [1],
          backgroundColor: ['#1c1c28'],
          borderColor: ['#ffffff10'],
          borderWidth: 1,
        }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false },
        },
        cutout: '65%',
      },
    });
    return;
  }

  const totalSpend = catEntries.reduce((s, [, v]) => s + v, 0);

  pieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: {
      labels: catEntries.map(([k]) => `${CAT[k]?.emoji || ''} ${k}`),
      datasets: [{
        data: catEntries.map(([, v]) => v),
        backgroundColor: catEntries.map(([k]) => (CAT[k]?.color || '#94a3b8') + '50'),
        borderColor: catEntries.map(([k]) => CAT[k]?.color || '#94a3b8'),
        borderWidth: 2,
        hoverOffset: 8,
      }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          display: true,
          position: 'right',
          labels: {
            color: '#8b8ba0',
            font: { family: 'JetBrains Mono', size: 10 },
            boxWidth: 10,
            padding: 10,
          },
        },
        tooltip: {
          ...CHART_THEME.tooltip,
          callbacks: {
            label: ctx => ` ${fmt(ctx.raw)} (${Math.round((ctx.raw / totalSpend) * 100)}%)`,
          },
        },
      },
      cutout: '60%',
    },
  });
}

function renderCharts() {
  renderBarChart();
  renderPieChart();
}

/* ==================== EXPENSE LIST ==================== */
function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filterCat = document.getElementById('filterCat').value;
  const list = document.getElementById('expenseList');

  const filtered = expenses.filter(e => {
    const matchSearch = e.name.toLowerCase().includes(search) ||
                        e.category.toLowerCase().includes(search);
    const matchCat = !filterCat || e.category === filterCat;
    return matchSearch && matchCat;
  });

  if (filtered.length === 0) {
    const icon = expenses.length === 0 ? '🪙' : '🔍';
    const msg = expenses.length === 0
      ? 'No expenses yet. Add one above.'
      : 'No expenses match your search.';
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${icon}</div>
        <p>${msg}</p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(e => {
    const cat = CAT[e.category] || CAT.Other;
    const d = new Date(e.date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('en-IN', {
      day: 'numeric', month: 'short', year: '2-digit',
    });

    return `
      <div class="expense-item">
        <div class="cat-dot" style="background:${cat.bg};">${cat.emoji}</div>
        <div class="expense-info">
          <div class="expense-name">${e.name}</div>
          <div class="expense-meta">${e.category} · ${dateStr}</div>
        </div>
        <div class="expense-amount">${fmt(e.amount)}</div>
        <button class="delete-btn" onclick="deleteExpense(${e.id})" title="Delete">×</button>
      </div>`;
  }).join('');
}

function deleteExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  Storage.saveExpenses(expenses);
  update();
  showToast('🗑 Expense removed');
}

function exportCSV() {
  if (expenses.length === 0) {
    showToast('⚠️ No expenses to export!');
    return;
  }

  const header = 'Date,Name,Category,Amount';
  const rows = expenses.map(e => `${e.date},"${e.name}",${e.category},${e.amount}`);
  const csv = [header, ...rows].join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `spendsense_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  showToast('📤 Exported to CSV!');
}

/* ==================== ACTIONS ==================== */
function addExpense() {
  const name = document.getElementById('expName').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const category = document.getElementById('expCategory').value;
  const date = document.getElementById('expDate').value;

  if (!name || !amount || !date) {
    showToast('❌ Please fill all fields');
    return;
  }

  expenses.push({
    id: Date.now(),
    name,
    amount,
    category,
    date,
  });

  Storage.saveExpenses(expenses);
  document.getElementById('expName').value = '';
  document.getElementById('expAmount').value = '';
  document.getElementById('expDate').value = '';

  update();
  showToast('✅ Expense added!');
}

function saveBudget() {
  const monthly = parseFloat(document.getElementById('monthlyBudget').value);
  const weekly = parseFloat(document.getElementById('weeklyBudget').value);

  if (monthly > 0) budget.monthly = monthly;
  if (weekly > 0) budget.weekly = weekly;

  Storage.saveBudget(budget);
  update();
  showToast('💾 Budget saved!');
}

function toggleSavage() {
  savageMode = !savageMode;
  Storage.setSavageMode(savageMode);
  const toggle = document.getElementById('savageToggle');
  toggle.classList.toggle('active');
  update();
  showToast(savageMode ? '😈 Savage Mode ON' : '😇 Savage Mode OFF');
}

function clearAll() {
  if (confirm('⚠️ This will delete ALL data. Are you sure?')) {
    expenses = [];
    budget = { monthly: 20000, weekly: 5000 };
    savageMode = false;
    Storage.clearAll();
    update();
    showToast('🗑 All data cleared');
  }
}

function showToast(message) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

/* ==================== MAIN UPDATE ==================== */
function update() {
  updateStats();
  updateBudget();
  updateInsights();
  renderCharts();
  renderList();
}

/* ==================== INIT ==================== */
window.addEventListener('load', () => {
  expenses = Storage.getExpenses();
  budget = Storage.getBudget();
  savageMode = Storage.getSavageMode();

  document.getElementById('monthlyBudget').value = budget.monthly;
  document.getElementById('weeklyBudget').value = budget.weekly;
  document.getElementById('expDate').valueAsDate = new Date();

  const toggle = document.getElementById('savageToggle');
  if (savageMode) toggle.classList.add('active');

  update();
});
</script>
